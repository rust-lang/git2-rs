name: CI
on:
  pull_request:
  merge_group:

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        build: [stable, beta, nightly, macos, windows, MSRV]
        include:
          - build: stable
            os: ubuntu-latest
            rust: stable
          - build: beta
            os: ubuntu-latest
            rust: beta
          - build: nightly
            os: ubuntu-latest
            rust: nightly
          # 1.87 is the minimum supported per Cargo.toml
          - build: MSRV
            os: ubuntu-latest
            rust: "1.87"
          - build: macos
            os: macos-latest
            rust: stable
          - build: windows
            os: windows-latest
            rust: stable
    steps:
    - uses: actions/checkout@master
      with:
        submodules: true
    - name: Install Rust (rustup)
      run: rustup update ${{ matrix.rust }} --no-self-update && rustup default ${{ matrix.rust }}
      shell: bash
    - name: Cargo test (locked)
      if: ${{ matrix.build != 'MSRV' }}
      run: cargo test --locked
    - name: Remove lock file
      if: ${{ matrix.build == 'MSRV' }}
      run: rm Cargo.lock
    - name: Cargo test (unlocked)
      if: ${{ matrix.build == 'MSRV' }}
      run: cargo test
    - run: cargo test --features https,ssh
    # Single-threaded: libgit2's builtin SHA256 is not thread-safe.
    # See https://github.com/rust-lang/git2-rs/issues/1255.
    - run: cargo test --features unstable-sha256 -- --test-threads=1
    - run: cargo test --features https,ssh,unstable-sha256
    - run: cargo test -p git2-curl
    - run: cargo run -p systest
    - run: cargo run -p systest --features unstable-sha256

  rustfmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@master
    - name: Install Rust
      run: rustup update stable && rustup default stable && rustup component add rustfmt
    - run: cargo fmt -- --check

  # The success job is here to consolidate the total success/failure state of
  # all other jobs. This job is then included in the GitHub branch protection
  # rule which prevents merges unless all other jobs are passing. This makes
  # it easier to manage the list of jobs via this yml file and to prevent
  # accidentally adding new jobs without also updating the branch protections.
  success:
    name: Success gate
    if: always()
    needs:
      - test
      - rustfmt
    runs-on: ubuntu-latest
    steps:
      - run: jq --exit-status 'all(.result == "success")' <<< '${{ toJson(needs) }}'
      - name: Done
        run: exit 0
